---
# ArgoCD Application for monitoring stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: payment-platform
  source:
    repoURL: https://github.com/YOUR_ORG/secure-payment-platform.git
    targetRevision: main
