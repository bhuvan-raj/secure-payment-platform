apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payment-platform

resources:
  - ../../base/namespace.yaml
  - ../../base/network-policy.yaml
  - ../../base/auth-service/deployment.yaml
  - ../../base/payment-service/deployment.yaml
  - ../../base/transaction-service/deployment.yaml
  - ../../base/ingress/ingress.yaml

# Dev-specific patches
patches:
  # Reduce replicas in dev
  - target:
      kind: Deployment
      name: auth-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: payment-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: transaction-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

# Replace image placeholders with real ECR images
images:
  - name: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/auth-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/payment-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/transaction-service
    newTag: latest

commonLabels:
  environment: dev
  managed-by: argocd

commonAnnotations:
  deployment-time: "placeholder"
