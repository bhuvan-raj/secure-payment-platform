apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: payment-platform

resources:
  - ../../base/namespace.yaml
  - ../../base/network-policy.yaml
  - ../../base/auth-service/deployment.yaml
  - ../../base/payment-service/deployment.yaml
  - ../../base/transaction-service/deployment.yaml
  - ../../base/ingress/ingress.yaml

# Prod-specific patches: more replicas, higher limits
patches:
  - target:
      kind: Deployment
      name: auth-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
  - target:
      kind: Deployment
      name: payment-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: transaction-service
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

images:
  - name: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/auth-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/payment-service
    newTag: latest
  - name: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/transaction-service
    newTag: latest

commonLabels:
  environment: prod
  managed-by: argocd
