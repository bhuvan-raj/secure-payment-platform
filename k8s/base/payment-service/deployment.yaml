---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-service-sa
  namespace: payment-platform
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/secure-payment-dev-payment-service-role
  labels:
    app: payment-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment-platform
  labels:
    app: payment-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: payment-service-sa
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: payment-service
      containers:
        - name: payment-service
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/payment-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: AWS_REGION
              value: "us-east-1"
            - name: DB_SECRET_ARN
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: DB_SECRET_ARN
            - name: AUTH_SERVICE_URL
              value: "http://auth-service.payment-platform.svc.cluster.local:8000"
            - name: PAYMENT_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: payment-service-config
                  key: PAYMENT_QUEUE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: payment-platform
  labels:
    app: payment-service
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: payment-platform
data:
  DB_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:ACCOUNT_ID:secret:dev/payment-platform/db-auth"
  PAYMENT_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/ACCOUNT_ID/dev-payment-queue.fifo"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: payment-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-service-pdb
  namespace: payment-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: payment-service
